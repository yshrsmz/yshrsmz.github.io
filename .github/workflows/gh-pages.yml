name: Build and deploy site to GitHub Pages

on:
  push:
    branches:
      - development
  # Pages source を `workflow` に切り替えた直後の手動再実行用
  workflow_dispatch:

# 公式推奨: 進行中の deploy は中断せず完走させる
# 将来 PR preview workflow を足す場合は別 group 名 (pages-preview 等) に分離すること
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # skip deployment if `[skip]` is in the commit message
    if: ${{ !contains(github.event.head_commit.message, '[skip]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Check Node.js version
        run: |
          mise exec node -- node --version

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm blog:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./packages/blog/.vitepress/dist
          # .well-known/brave-rewards-verification.txt を artifact に含めるため必須
          # (default では tar の --exclude=.[^/]* で top-level の dotfile が除外される)
          include-hidden-files: true

  deploy:
    needs: build
    # build が skipped だと needs 経由で deploy も skipped になるのがデフォルト挙動だが、
    # 明示的に success を要求することで将来 `if: always()` 等の誤変更時のリグレッションを防ぐ
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-slim
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
